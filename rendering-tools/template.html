<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Snippet Renderer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1b26;
            --header-color: #1f2335;
            --text-color: #a9b1d6;
            --keyword: #bb9af7;
            --string: #9ece6a;
            --comment: #565f89;
            --function: #7aa2f7;
            --variable: #c0caf5;
            --constant: #ff9e64;
            --tag: #f7768e;
            --punctuation: #89ddff;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'JetBrains Mono', monospace;
        }

        #snippet-container {
            background: var(--bg-color);
            border-radius: 12px;
            overflow: hidden;
            display: inline-block;
            min-width: 600px;
            box-sizing: border-box;
            /* CRITICAL: No outer padding, no borders, no shadow per user spec */
        }

        .header {
            background: var(--header-color);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dots {
            display: flex;
            gap: 8px;
            margin-right: 24px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red {
            background: #ff5f56;
        }

        .dot.yellow {
            background: #ffbd2e;
        }

        .dot.green {
            background: #27c93f;
        }

        .filename {
            color: var(--text-color);
            font-size: 13px;
            opacity: 0.8;
            flex-grow: 1;
            text-align: center;
            padding-right: 60px;
            /* Offset for dots to center properly */
        }

        .code-area {
            padding: 24px;
            line-height: 1.5;
            font-size: 16px;
            color: var(--text-color);
            white-space: pre;
        }

        /* Basic Syntax Highlighting Classes */
        .kw {
            color: var(--keyword);
        }

        .str {
            color: var(--string);
        }

        .com {
            color: var(--comment);
            font-style: italic;
        }

        .fn {
            color: var(--function);
        }

        .var {
            color: var(--variable);
        }

        .const {
            color: var(--constant);
        }

        .tag {
            color: var(--tag);
        }

        .punc {
            color: var(--punctuation);
        }

        .op {
            color: #89ddff;
        }

        .type {
            color: #e0af68;
        }
    </style>
</head>

<body>
    <div id="snippet-container">
        <div class="header">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="filename" id="display-filename">src/components/skills-section.tsx</div>
        </div>
        <div class="code-area" id="display-code">
            <!-- Code will be injected here -->
        </div>
    </div>

    <script>
        function setSnippet(filename, codeHtml) {
            document.getElementById('display-filename').textContent = filename;
            document.getElementById('display-code').innerHTML = codeHtml;
        }
    </script>
</body>

</html>
